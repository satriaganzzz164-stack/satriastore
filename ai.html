<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Pribadi — SatzAI</title>
<style>
  :root {
    --bg: #07050f;
    --bg2: #0e0a1a;
    --bg3: #140f22;
    --border: rgba(160,100,255,0.15);
    --accent: #a855f7;
    --neon: #e879f9;
    --accent2: #06b6d4;
    --text: #f0eaff;
    --muted: rgba(240,234,255,0.45);
    --radius: 16px;
    --glow: 0 0 40px rgba(168,85,247,0.2);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    height: 100%;
    background: var(--bg);
    font-family: 'Segoe UI', system-ui, sans-serif;
    color: var(--text);
    overflow: hidden;
  }

  body::before {
    content: '';
    position: fixed;
    top: -20%; left: 50%;
    transform: translateX(-50%);
    width: 800px; height: 600px;
    background: radial-gradient(ellipse, rgba(168,85,247,0.12) 0%, transparent 70%);
    pointer-events: none;
    z-index: 0;
  }

  .app {
    position: relative;
    z-index: 1;
    height: 100vh;
    display: flex;
    flex-direction: column;
    max-width: 900px;
    margin: 0 auto;
    padding: 20px;
  }

  /* Header */
  .header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 12px 20px;
    background: rgba(14,10,26,0.7);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    backdrop-filter: blur(14px);
    margin-bottom: 16px;
  }
  .header .brand {
    font-size: 18px;
    font-weight: 800;
    background: linear-gradient(135deg, var(--accent), var(--neon));
    -webkit-background-clip: text;
    background-clip: text;
    -webkit-text-fill-color: transparent;
  }
  .header .status {
    font-size: 12px;
    color: var(--muted);
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .status-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: #22c55e;
    box-shadow: 0 0 10px #22c55e;
    animation: pulse 2s infinite;
  }
  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.5; }
  }

  /* Chat Area */
  .chat-area {
    flex: 1;
    overflow-y: auto;
    padding: 10px;
    display: flex;
    flex-direction: column;
    gap: 16px;
  }
  .chat-area::-webkit-scrollbar {
    width: 4px;
  }
  .chat-area::-webkit-scrollbar-thumb {
    background: var(--border);
    border-radius: 2px;
  }

  /* Message */
  .message {
    display: flex;
    gap: 12px;
    max-width: 85%;
    animation: fadeUp 0.4s ease;
  }
  .message.user {
    align-self: flex-end;
    flex-direction: row-reverse;
  }
  .message.ai {
    align-self: flex-start;
  }
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(12px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .avatar {
    width: 36px; height: 36px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 18px;
    flex-shrink: 0;
  }
  .message.user .avatar {
    background: linear-gradient(135deg, var(--accent2), #22d3ee);
  }
  .message.ai .avatar {
    background: linear-gradient(135deg, var(--accent), var(--neon));
  }

  .bubble {
    padding: 14px 18px;
    border-radius: 18px;
    font-size: 14px;
    line-height: 1.6;
    word-wrap: break-word;
  }
  .message.user .bubble {
    background: linear-gradient(135deg, rgba(168,85,247,0.2), rgba(232,121,249,0.15));
    border: 1px solid rgba(168,85,247,0.2);
    border-bottom-right-radius: 4px;
  }
  .message.ai .bubble {
    background: rgba(255,255,255,0.03);
    border: 1px solid var(--border);
    border-bottom-left-radius: 4px;
  }
  .bubble .time {
    font-size: 11px;
    color: var(--muted);
    margin-top: 6px;
    display: block;
  }

  /* Typing */
  .typing {
    display: flex;
    gap: 4px;
    padding: 8px 0;
  }
  .typing span {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: var(--neon);
    animation: typingBounce 1.4s infinite ease-in-out;
  }
  .typing span:nth-child(1) { animation-delay: 0s; }
  .typing span:nth-child(2) { animation-delay: 0.2s; }
  .typing span:nth-child(3) { animation-delay: 0.4s; }
  @keyframes typingBounce {
    0%, 80%, 100% { transform: scale(0); }
    40% { transform: scale(1); }
  }

  /* Input Area */
  .input-area {
    display: flex;
    gap: 12px;
    padding: 16px;
    background: rgba(14,10,26,0.7);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    backdrop-filter: blur(14px);
    margin-top: 16px;
  }
  .input-area input {
    flex: 1;
    background: rgba(255,255,255,0.03);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 12px 16px;
    color: var(--text);
    font-size: 14px;
    font-family: inherit;
    outline: none;
    transition: all 0.3s;
  }
  .input-area input:focus {
    border-color: var(--neon);
    box-shadow: 0 0 20px rgba(232,121,249,0.1);
  }
  .input-area input::placeholder {
    color: var(--muted);
  }
  .send-btn {
    width: 44px; height: 44px;
    border-radius: 12px;
    border: none;
    background: linear-gradient(135deg, var(--accent), var(--neon));
    color: #fff;
    font-size: 18px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.3s;
    flex-shrink: 0;
  }
  .send-btn:hover {
    transform: scale(1.05);
    box-shadow: 0 0 20px rgba(168,85,247,0.4);
  }
  .send-btn:disabled {
    opacity: 0.5;
    cursor: not-allowed;
    transform: none;
  }

  /* Welcome */
  .welcome {
    text-align: center;
    padding: 40px 20px;
    color: var(--muted);
  }
  .welcome h2 {
    font-size: 24px;
    font-weight: 800;
    background: linear-gradient(135deg, var(--accent), var(--neon));
    -webkit-background-clip: text;
    background-clip: text;
    -webkit-text-fill-color: transparent;
    margin-bottom: 8px;
  }
  .welcome p {
    font-size: 14px;
    margin-bottom: 24px;
  }
  .suggestions {
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
    justify-content: center;
  }
  .suggestion {
    padding: 10px 16px;
    background: rgba(255,255,255,0.03);
    border: 1px solid var(--border);
    border-radius: 12px;
    font-size: 13px;
    color: var(--text);
    cursor: pointer;
    transition: all 0.3s;
  }
  .suggestion:hover {
    border-color: var(--neon);
    background: rgba(168,85,247,0.1);
  }

  /* Responsive */
  @media (max-width: 600px) {
    .app { padding: 10px; }
    .message { max-width: 95%; }
    .header .brand { font-size: 16px; }
  }
</style>
<base target="_blank">
</head>
<body>

<div class="app">
  <div class="header">
    <div class="brand">SATRIA</div>
    <div class="status">
      <span class="status-dot"></span>
      <span>Online</span>
    </div>
  </div>

  <div class="chat-area" id="chat-area">
    <div class="welcome" id="welcome">
      <h2>ASISTEN NYA SATRIA/h2>
      <p>Asisten AI pribadi Anda. Tanyakan apa saja!</p>
      <div class="suggestions">
        <span class="suggestion" onclick="sendSuggestion(this)">📝 Buatkan saya motivasi</span>
        <span class="suggestion" onclick="sendSuggestion(this)">💻 Jelaskan coding</span>
        <span class="suggestion" onclick="sendSuggestion(this)">🎨 Ide desain website</span>
        <span class="suggestion" onclick="sendSuggestion(this)">📚 Ceritakan dongeng</span>
      </div>
    </div>
  </div>

  <div class="input-area">
    <input type="text" id="user-input" placeholder="Ketik pesan kamu di sini..." onkeydown="if(event.key==='Enter')sendMessage()">
    <button class="send-btn" id="send-btn" onclick="sendMessage()">➤</button>
  </div>
</div>

<script>
  const chatArea = document.getElementById('chat-area');
  const userInput = document.getElementById('user-input');
  const sendBtn = document.getElementById('send-btn');
  const welcome = document.getElementById('welcome');

  function getTime() {
    const now = new Date();
    return now.getHours().toString().padStart(2,'0') + ':' + now.getMinutes().toString().padStart(2,'0');
  }

  function addMessage(text, isUser) {
    if (welcome) welcome.style.display = 'none';

    const msg = document.createElement('div');
    msg.className = 'message ' + (isUser ? 'user' : 'ai');
    msg.innerHTML = `
      <div class="avatar">${isUser ? '👤' : '🤖'}</div>
      <div class="bubble">
        ${text}
        <span class="time">${getTime()}</span>
      </div>
    `;
    chatArea.appendChild(msg);
    chatArea.scrollTop = chatArea.scrollHeight;
  }

  function addTyping() {
    const typing = document.createElement('div');
    typing.className = 'message ai';
    typing.id = 'typing-indicator';
    typing.innerHTML = `
      <div class="avatar">🤖</div>
      <div class="bubble">
        <div class="typing"><span></span><span></span><span></span></div>
      </div>
    `;
    chatArea.appendChild(typing);
    chatArea.scrollTop = chatArea.scrollHeight;
    return typing;
  }

  function removeTyping() {
    const typing = document.getElementById('typing-indicator');
    if (typing) typing.remove();
  }

  async function sendMessage() {
    const text = userInput.value.trim();
    if (!text) return;

    userInput.value = '';
    addMessage(text, true);

    sendBtn.disabled = true;
    const typing = addTyping();

    try {
      // Using Pollinations AI (free, no API key)
      const response = await fetch('https://text.pollinations.ai/' + encodeURIComponent(text) + '?model=openai&seed=' + Date.now(), {
        method: 'GET',
      });

      if (!response.ok) throw new Error('API Error');

      const result = await response.text();
      removeTyping();
      addMessage(result, false);
    } catch (err) {
      removeTyping();
      // Fallback: simple response
      const fallback = getFallbackResponse(text);
      addMessage(fallback, false);
    }

    sendBtn.disabled = false;
    userInput.focus();
  }

  function sendSuggestion(el) {
    userInput.value = el.textContent.replace(/^[📝💻🎨📚] /, '');
    sendMessage();
  }

  function getFallbackResponse(text) {
    const lower = text.toLowerCase();
    if (lower.includes('motivasi') || lower.includes('semangat')) {
      return 'Setiap langkah kecil yang kamu ambil hari ini adalah investasi untuk masa depan yang lebih baik. Jangan menyerah! 💪✨';
    }
    if (lower.includes('coding') || lower.includes('program')) {
      return 'Coding itu seperti memecahkan puzzle — setiap baris kode adalah potongan yang membentuk solusi. Terus latihan ya! 🚀';
    }
    if (lower.includes('desain') || lower.includes('design')) {
      return 'Desain yang baik bukan hanya tentang estetika, tapi juga tentang bagaimana pengguna merasakan pengalaman. Pikirkan user journey! 🎨';
    }
    if (lower.includes('dongeng') || lower.includes('cerita')) {
      return 'Dahulu kala, di sebuah kerajaan digital, ada seorang developer yang membangun website paling keren di dunia... 🌟';
    }
    return 'Maaf, saat ini layanan AI sedang maintenance. Coba tanyakan hal lain atau tunggu sebentar ya! 🙏';
  }

  // Auto-focus input
  userInput.focus();
</script>

</body>
