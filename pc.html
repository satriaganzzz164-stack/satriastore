<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NEXUS PC | Premium Gaming & Computer Store</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;600;700;800;900&family=Rajdhani:wght@300;400;500;600;700&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/ScrollTrigger.min.js"></script>
    <style>
        :root {
            --primary: #00f0ff;
            --primary-dark: #00b8c4;
            --secondary: #ff2d95;
            --accent: #7b2dff;
            --gold: #ffd700;
            --dark: #0a0a0f;
            --darker: #050508;
            --card: #111118;
            --card-hover: #1a1a25;
            --text: #e0e0e8;
            --text-muted: #8888a0;
            --border: rgba(0, 240, 255, 0.15);
            --glow: 0 0 20px rgba(0, 240, 255, 0.3), 0 0 40px rgba(0, 240, 255, 0.1);
            --glow-pink: 0 0 20px rgba(255, 45, 149, 0.3), 0 0 40px rgba(255, 45, 149, 0.1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        html { scroll-behavior: smooth; }
        body {
            font-family: 'Inter', sans-serif;
            background: var(--darker);
            color: var(--text);
            overflow-x: hidden;
        }

        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: var(--darker); }
        ::-webkit-scrollbar-thumb {
            background: linear-gradient(180deg, var(--primary), var(--accent));
            border-radius: 3px;
        }

        /* ===== LOADER ===== */
        .loader {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: var(--darker); z-index: 9999;
            display: flex; align-items: center; justify-content: center;
            flex-direction: column; transition: opacity 0.8s, visibility 0.8s;
        }
        .loader.hidden { opacity: 0; visibility: hidden; }
        .loader-text {
            font-family: 'Orbitron', sans-serif; font-size: 2rem; font-weight: 800;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            background-clip: text; margin-bottom: 30px; letter-spacing: 5px;
        }
        .loader-bar { width: 200px; height: 3px; background: var(--card); border-radius: 3px; overflow: hidden; position: relative; }
        .loader-progress { position: absolute; top: 0; left: 0; height: 100%; width: 0%; background: linear-gradient(90deg, var(--primary), var(--secondary)); border-radius: 3px; animation: loadProgress 2s ease forwards; }
        @keyframes loadProgress { 0% { width: 0%; } 100% { width: 100%; } }

        /* ===== NAVBAR ===== */
        .navbar {
            position: fixed; top: 0; left: 0; width: 100%; z-index: 1000;
            padding: 20px 5%; display: flex; justify-content: space-between; align-items: center;
            transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .navbar.scrolled {
            background: rgba(5, 5, 8, 0.95); backdrop-filter: blur(20px);
            padding: 15px 5%; border-bottom: 1px solid var(--border);
        }
        .logo {
            font-family: 'Orbitron', sans-serif; font-size: 1.8rem; font-weight: 800;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            background-clip: text; letter-spacing: 2px; position: relative;
        }
        .logo::after {
            content: 'NEXUS'; position: absolute; top: 0; left: 0;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            background-clip: text; filter: blur(15px); opacity: 0.5;
        }
        .logo span { font-weight: 300; font-size: 0.9rem; display: block; letter-spacing: 8px; color: var(--text-muted); -webkit-text-fill-color: var(--text-muted); }

        .nav-links { display: flex; gap: 40px; list-style: none; }
        .nav-links a {
            font-family: 'Rajdhani', sans-serif; font-size: 1.1rem; font-weight: 600;
            color: var(--text-muted); text-decoration: none; position: relative;
            padding: 5px 0; transition: color 0.3s; letter-spacing: 1px; text-transform: uppercase;
        }
        .nav-links a::before {
            content: ''; position: absolute; bottom: 0; left: 0; width: 0; height: 2px;
            background: linear-gradient(90deg, var(--primary), var(--secondary));
            transition: width 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .nav-links a:hover { color: var(--primary); }
        .nav-links a:hover::before { width: 100%; }

        .nav-cta {
            font-family: 'Orbitron', sans-serif; font-size: 0.8rem; font-weight: 600;
            padding: 12px 30px; background: linear-gradient(135deg, var(--primary), var(--accent));
            border: none; border-radius: 50px; color: var(--dark); cursor: pointer;
            position: relative; overflow: hidden; transition: all 0.3s;
            letter-spacing: 1px; text-transform: uppercase;
        }
        .nav-cta::before {
            content: ''; position: absolute; top: 0; left: -100%; width: 100%; height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.3), transparent);
            transition: left 0.5s;
        }
        .nav-cta:hover::before { left: 100%; }
        .nav-cta:hover { transform: translateY(-2px); box-shadow: var(--glow); }

        /* ===== HERO ===== */
        .hero {
            min-height: 100vh; display: flex; align-items: center; justify-content: center;
            position: relative; overflow: hidden; padding: 0 5%;
        }
        .hero-bg { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 0; }
        .hero-bg canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; }
        .hero-overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(ellipse at center, transparent 0%, var(--darker) 70%); z-index: 1;
        }
        .hero-content { position: relative; z-index: 2; text-align: center; max-width: 900px; }
        .hero-badge {
            display: inline-block; font-family: 'Rajdhani', sans-serif; font-size: 0.9rem;
            font-weight: 600; letter-spacing: 4px; text-transform: uppercase; color: var(--primary);
            border: 1px solid var(--border); padding: 8px 24px; border-radius: 50px;
            margin-bottom: 30px; background: rgba(0, 240, 255, 0.05); backdrop-filter: blur(10px);
        }
        .hero-title {
            font-family: 'Orbitron', sans-serif; font-size: clamp(2.5rem, 6vw, 5rem);
            font-weight: 900; line-height: 1.1; margin-bottom: 25px; letter-spacing: 2px;
        }
        .hero-title .gradient-text {
            background: linear-gradient(135deg, var(--primary), var(--secondary), var(--accent));
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            background-clip: text; background-size: 200% 200%;
            animation: gradientShift 4s ease infinite;
        }
        @keyframes gradientShift { 0%, 100% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } }
        .hero-subtitle {
            font-family: 'Inter', sans-serif; font-size: 1.2rem; color: var(--text-muted);
            margin-bottom: 50px; line-height: 1.8; max-width: 600px; margin-left: auto; margin-right: auto;
        }
        .hero-buttons { display: flex; gap: 20px; justify-content: center; flex-wrap: wrap; }

        .btn-primary {
            font-family: 'Orbitron', sans-serif; font-size: 0.85rem; font-weight: 700;
            padding: 18px 45px; background: linear-gradient(135deg, var(--primary), var(--accent));
            border: none; border-radius: 50px; color: var(--dark); cursor: pointer;
            position: relative; overflow: hidden; transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            letter-spacing: 2px; text-transform: uppercase; text-decoration: none; display: inline-block;
        }
        .btn-primary:hover { transform: translateY(-3px) scale(1.02); box-shadow: 0 10px 40px rgba(0, 240, 255, 0.4); }

        .btn-secondary {
            font-family: 'Orbitron', sans-serif; font-size: 0.85rem; font-weight: 700;
            padding: 18px 45px; background: transparent; border: 2px solid var(--border);
            border-radius: 50px; color: var(--text); cursor: pointer; position: relative;
            overflow: hidden; transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            letter-spacing: 2px; text-transform: uppercase; text-decoration: none; display: inline-block;
        }
        .btn-secondary:hover { border-color: var(--primary); color: var(--primary); box-shadow: var(--glow); transform: translateY(-3px); }

        .scroll-indicator {
            position: absolute; bottom: 40px; left: 50%; transform: translateX(-50%);
            z-index: 2; display: flex; flex-direction: column; align-items: center; gap: 10px;
            animation: bounce 2s infinite;
        }
        .scroll-indicator span { font-family: 'Rajdhani', sans-serif; font-size: 0.8rem; letter-spacing: 3px; text-transform: uppercase; color: var(--text-muted); }
        .scroll-indicator i { font-size: 1.5rem; color: var(--primary); }
        @keyframes bounce { 0%, 20%, 50%, 80%, 100% { transform: translateX(-50%) translateY(0); } 40% { transform: translateX(-50%) translateY(-10px); } 60% { transform: translateX(-50%) translateY(-5px); } }

        /* ===== SECTIONS ===== */
        section { position: relative; padding: 120px 5%; }
        .section-header { text-align: center; margin-bottom: 80px; }
        .section-label {
            font-family: 'Rajdhani', sans-serif; font-size: 0.9rem; font-weight: 600;
            letter-spacing: 4px; text-transform: uppercase; color: var(--primary);
            margin-bottom: 15px; display: inline-block; position: relative;
        }
        .section-label::before, .section-label::after {
            content: ''; position: absolute; top: 50%; width: 50px; height: 1px;
        }
        .section-label::before { right: calc(100% + 20px); background: linear-gradient(90deg, transparent, var(--primary)); }
        .section-label::after { left: calc(100% + 20px); background: linear-gradient(90deg, var(--primary), transparent); }
        .section-title { font-family: 'Orbitron', sans-serif; font-size: clamp(2rem, 4vw, 3.5rem); font-weight: 800; margin-bottom: 20px; line-height: 1.2; }
        .section-desc { font-size: 1.1rem; color: var(--text-muted); max-width: 600px; margin: 0 auto; line-height: 1.8; }

        /* ===== MARQUEE ===== */
        .marquee-section { background: var(--dark); padding: 30px 0; overflow: hidden; border-top: 1px solid var(--border); border-bottom: 1px solid var(--border); }
        .marquee-track { display: flex; animation: marquee 30s linear infinite; white-space: nowrap; }
        .marquee-item {
            font-family: 'Orbitron', sans-serif; font-size: 1rem; font-weight: 700;
            color: var(--text-muted); padding: 0 40px; display: flex; align-items: center; gap: 15px;
            text-transform: uppercase; letter-spacing: 2px;
        }
        .marquee-item i { color: var(--primary); font-size: 1.2rem; }
        @keyframes marquee { 0% { transform: translateX(0); } 100% { transform: translateX(-50%); } }

        /* ===== PRODUCTS ===== */
        .products-section { background: var(--dark); }
        .products-grid {
            display: grid; grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
            gap: 30px; max-width: 1400px; margin: 0 auto;
        }
        .product-card {
            background: var(--card); border: 1px solid var(--border); border-radius: 20px;
            overflow: hidden; position: relative; transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
            cursor: pointer;
        }
        .product-card::before {
            content: ''; position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(135deg, rgba(0, 240, 255, 0.05), rgba(255, 45, 149, 0.05));
            opacity: 0; transition: opacity 0.5s; z-index: 1;
        }
        .product-card:hover::before { opacity: 1; }
        .product-card:hover {
            transform: translateY(-10px); border-color: rgba(0, 240, 255, 0.3);
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5), var(--glow);
        }
        .product-image { width: 100%; height: 280px; object-fit: cover; transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1); }
        .product-card:hover .product-image { transform: scale(1.05); }
        .product-badge {
            position: absolute; top: 20px; left: 20px; z-index: 2;
            font-family: 'Rajdhani', sans-serif; font-weight: 700; font-size: 0.75rem;
            padding: 6px 16px; border-radius: 50px; text-transform: uppercase; letter-spacing: 1px;
        }
        .badge-hot { background: linear-gradient(135deg, #ff4757, #ff2d95); color: white; }
        .badge-new { background: linear-gradient(135deg, var(--primary), var(--accent)); color: var(--dark); }
        .badge-premium { background: linear-gradient(135deg, var(--gold), #ffaa00); color: var(--dark); }
        .product-info { padding: 25px; position: relative; z-index: 2; }
        .product-category { font-family: 'Rajdhani', sans-serif; font-size: 0.85rem; color: var(--primary); letter-spacing: 2px; text-transform: uppercase; margin-bottom: 8px; }
        .product-name { font-family: 'Orbitron', sans-serif; font-size: 1.2rem; font-weight: 700; margin-bottom: 10px; line-height: 1.3; }
        .product-specs { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 15px; }
        .spec-tag { font-size: 0.75rem; padding: 4px 12px; background: rgba(0, 240, 255, 0.1); border: 1px solid var(--border); border-radius: 20px; color: var(--text-muted); }
        .product-footer { display: flex; justify-content: space-between; align-items: center; padding-top: 15px; border-top: 1px solid var(--border); }
        .product-price { font-family: 'Orbitron', sans-serif; font-size: 1.4rem; font-weight: 800; color: var(--primary); }
        .product-price .currency { font-size: 0.8rem; color: var(--text-muted); }
        .product-price .old { font-size: 0.9rem; color: var(--text-muted); text-decoration: line-through; margin-left: 10px; }
        .btn-buy { width: 45px; height: 45px; border-radius: 50%; background: linear-gradient(135deg, var(--primary), var(--accent)); border: none; color: var(--dark); cursor: pointer; display: flex; align-items: center; justify-content: center; transition: all 0.3s; font-size: 1rem; }
        .btn-buy:hover { transform: scale(1.1); box-shadow: var(--glow); }

        /* ===== FEATURES ===== */
        .features-section { background: var(--darker); position: relative; }
        .features-section::before { content: ''; position: absolute; top: 0; left: 0; width: 100%; height: 1px; background: linear-gradient(90deg, transparent, var(--primary), transparent); }
        .features-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 30px; max-width: 1200px; margin: 0 auto; }
        .feature-card {
            background: var(--card); border: 1px solid var(--border); border-radius: 20px;
            padding: 40px 30px; text-align: center; position: relative; overflow: hidden;
            transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .feature-card::after {
            content: ''; position: absolute; top: 0; left: 0; width: 100%; height: 3px;
            background: linear-gradient(90deg, var(--primary), var(--secondary), var(--accent));
            transform: scaleX(0); transform-origin: left;
            transition: transform 0.5s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .feature-card:hover::after { transform: scaleX(1); }
        .feature-card:hover { transform: translateY(-5px); border-color: rgba(0, 240, 255, 0.2); box-shadow: 0 15px 40px rgba(0, 0, 0, 0.3); }
        .feature-icon { width: 80px; height: 80px; margin: 0 auto 25px; background: linear-gradient(135deg, rgba(0, 240, 255, 0.1), rgba(255, 45, 149, 0.1)); border-radius: 20px; display: flex; align-items: center; justify-content: center; font-size: 2rem; color: var(--primary); position: relative; }
        .feature-icon::before { content: ''; position: absolute; inset: -2px; border-radius: 22px; background: linear-gradient(135deg, var(--primary), var(--secondary)); z-index: -1; opacity: 0; transition: opacity 0.3s; }
        .feature-card:hover .feature-icon::before { opacity: 0.3; }
        .feature-title { font-family: 'Orbitron', sans-serif; font-size: 1.2rem; font-weight: 700; margin-bottom: 15px; }
        .feature-desc { color: var(--text-muted); line-height: 1.7; font-size: 0.95rem; }

        /* ===== SHOWCASE ===== */
        .showcase-section { background: var(--dark); position: relative; overflow: hidden; }
        .showcase-section::before { content: ''; position: absolute; top: 0; left: 0; width: 100%; height: 1px; background: linear-gradient(90deg, transparent, var(--secondary), transparent); }
        .showcase-container { max-width: 1400px; margin: 0 auto; }
        .showcase-item { display: grid; grid-template-columns: 1fr 1fr; gap: 60px; align-items: center; margin-bottom: 100px; }
        .showcase-item:last-child { margin-bottom: 0; }
        .showcase-item.reverse { direction: rtl; }
        .showcase-item.reverse > * { direction: ltr; }
        .showcase-image-wrapper { position: relative; border-radius: 20px; overflow: hidden; }
        .showcase-image-wrapper::before { content: ''; position: absolute; inset: -2px; background: linear-gradient(135deg, var(--primary), var(--secondary), var(--accent)); border-radius: 22px; z-index: -1; opacity: 0.5; }
        .showcase-image { width: 100%; height: 400px; object-fit: cover; border-radius: 20px; transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1); }
        .showcase-image-wrapper:hover .showcase-image { transform: scale(1.03); }
        .showcase-content { padding: 20px 0; }
        .showcase-label { font-family: 'Rajdhani', sans-serif; font-size: 0.85rem; font-weight: 600; letter-spacing: 3px; text-transform: uppercase; color: var(--secondary); margin-bottom: 15px; }
        .showcase-title { font-family: 'Orbitron', sans-serif; font-size: clamp(1.5rem, 3vw, 2.5rem); font-weight: 800; margin-bottom: 20px; line-height: 1.2; }
        .showcase-desc { color: var(--text-muted); line-height: 1.8; margin-bottom: 30px; font-size: 1.05rem; }
        .showcase-specs { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; margin-bottom: 30px; }
        .showcase-spec { display: flex; align-items: center; gap: 12px; padding: 12px 15px; background: rgba(0, 240, 255, 0.05); border: 1px solid var(--border); border-radius: 12px; }
        .showcase-spec i { color: var(--primary); font-size: 1.1rem; }
        .showcase-spec span { font-size: 0.9rem; color: var(--text); }
        .showcase-price { font-family: 'Orbitron', sans-serif; font-size: 2rem; font-weight: 800; color: var(--primary); margin-bottom: 25px; }

        /* ===== STATS ===== */
        .stats-section { background: linear-gradient(135deg, rgba(0, 240, 255, 0.05), rgba(255, 45, 149, 0.05)); padding: 80px 5%; position: relative; }
        .stats-section::before, .stats-section::after { content: ''; position: absolute; left: 0; width: 100%; height: 1px; }
        .stats-section::before { top: 0; background: linear-gradient(90deg, transparent, var(--primary), transparent); }
        .stats-section::after { bottom: 0; background: linear-gradient(90deg, transparent, var(--secondary), transparent); }
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 40px; max-width: 1200px; margin: 0 auto; text-align: center; }
        .stat-item { position: relative; }
        .stat-number { font-family: 'Orbitron', sans-serif; font-size: 3rem; font-weight: 900; background: linear-gradient(135deg, var(--primary), var(--secondary)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; margin-bottom: 10px; }
        .stat-label { font-family: 'Rajdhani', sans-serif; font-size: 1rem; font-weight: 600; color: var(--text-muted); letter-spacing: 2px; text-transform: uppercase; }

        /* ===== TESTIMONIALS ===== */
        .testimonials-section { background: var(--darker); position: relative; }
        .testimonials-section::before { content: ''; position: absolute; top: 0; left: 0; width: 100%; height: 1px; background: linear-gradient(90deg, transparent, var(--accent), transparent); }
        .testimonials-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(350px, 1fr)); gap: 30px; max-width: 1200px; margin: 0 auto; }
        .testimonial-card { background: var(--card); border: 1px solid var(--border); border-radius: 20px; padding: 35px; position: relative; transition: all 0.4s; }
        .testimonial-card:hover { border-color: rgba(0, 240, 255, 0.2); transform: translateY(-5px); }
        .testimonial-quote { font-size: 3rem; color: var(--primary); opacity: 0.3; line-height: 1; margin-bottom: 10px; }
        .testimonial-text { color: var(--text-muted); line-height: 1.8; margin-bottom: 25px; font-size: 0.95rem; }
        .testimonial-author { display: flex; align-items: center; gap: 15px; }
        .testimonial-avatar { width: 50px; height: 50px; border-radius: 50%; background: linear-gradient(135deg, var(--primary), var(--secondary)); display: flex; align-items: center; justify-content: center; font-family: 'Orbitron', sans-serif; font-weight: 700; color: var(--dark); font-size: 1.2rem; }
        .testimonial-info h4 { font-family: 'Orbitron', sans-serif; font-size: 0.95rem; margin-bottom: 3px; }
        .testimonial-info span { font-size: 0.8rem; color: var(--text-muted); }
        .testimonial-stars { color: var(--gold); font-size: 0.85rem; margin-top: 5px; }

        /* ===== CTA ===== */
        .cta-section { background: linear-gradient(135deg, rgba(0, 240, 255, 0.08), rgba(123, 45, 255, 0.08)); padding: 100px 5%; text-align: center; position: relative; overflow: hidden; }
        .cta-section::before { content: ''; position: absolute; top: 0; left: 0; width: 100%; height: 1px; background: linear-gradient(90deg, transparent, var(--primary), var(--secondary), transparent); }
        .cta-title { font-family: 'Orbitron', sans-serif; font-size: clamp(2rem, 4vw, 3.5rem); font-weight: 800; margin-bottom: 20px; }
        .cta-desc { color: var(--text-muted); font-size: 1.1rem; max-width: 600px; margin: 0 auto 40px; line-height: 1.8; }

        /* ===== FOOTER ===== */
        .footer { background: var(--darker); padding: 80px 5% 30px; border-top: 1px solid var(--border); }
        .footer-grid { display: grid; grid-template-columns: 2fr 1fr 1fr 1fr; gap: 60px; max-width: 1400px; margin: 0 auto 60px; }
        .footer-brand .logo { margin-bottom: 20px; display: inline-block; }
        .footer-brand p { color: var(--text-muted); line-height: 1.8; margin-bottom: 25px; font-size: 0.95rem; }
        .footer-social { display: flex; gap: 15px; }
        .footer-social a { width: 45px; height: 45px; border-radius: 50%; border: 1px solid var(--border); display: flex; align-items: center; justify-content: center; color: var(--text-muted); text-decoration: none; transition: all 0.3s; font-size: 1.1rem; }
        .footer-social a:hover { border-color: var(--primary); color: var(--primary); box-shadow: var(--glow); transform: translateY(-3px); }
        .footer-column h4 { font-family: 'Orbitron', sans-serif; font-size: 1rem; font-weight: 700; margin-bottom: 25px; color: var(--text); }
        .footer-column ul { list-style: none; }
        .footer-column ul li { margin-bottom: 12px; }

<base target="_blank">
</head>
<body>

<div class="app">
  <div class="header">
    <div class="brand">🪐 SatzAI</div>
    <div class="status">
      <span class="status-dot"></span>
      <span>Online</span>
    </div>
  </div>

  <div class="chat-area" id="chat-area">
    <div class="welcome" id="welcome">
      <h2>Selamat Datang di SatzAI</h2>
      <p>Asisten AI pribadi Anda. Tanyakan apa saja!</p>
      <div class="suggestions">
        <span class="suggestion" onclick="sendSuggestion(this)">📝 Buatkan saya motivasi</span>
        <span class="suggestion" onclick="sendSuggestion(this)">💻 Jelaskan coding</span>
        <span class="suggestion" onclick="sendSuggestion(this)">🎨 Ide desain website</span>
        <span class="suggestion" onclick="sendSuggestion(this)">📚 Ceritakan dongeng</span>
      </div>
    </div>
  </div>

  <div class="input-area">
    <input type="text" id="user-input" placeholder="Ketik pesan kamu di sini..." onkeydown="if(event.key==='Enter')sendMessage()">
    <button class="send-btn" id="send-btn" onclick="sendMessage()">➤</button>
  </div>
</div>

<script>
  const chatArea = document.getElementById('chat-area');
  const userInput = document.getElementById('user-input');
  const sendBtn = document.getElementById('send-btn');
  const welcome = document.getElementById('welcome');

  // Database jawaban lengkap
  const responses = {
    motivasi: [
      'Setiap langkah kecil yang kamu ambil hari ini adalah investasi untuk masa depan yang lebih baik. Jangan menyerah! 💪✨',
      'Kegagalan adalah guru terbaik. Bangkit, belajar, dan terus maju! 🔥',
      'Kamu lebih kuat dari yang kamu pikir. Percayalah pada dirimu sendiri! 💫',
      'Hari ini mungkin sulit, besok akan lebih baik. Tetap semangat! 🌟',
      'Jangan bandingkan awalmu dengan puncak orang lain. Setiap perjalanan punya waktunya masing-masing. 🚀',
      'Kesuksesan bukan tentang tidak pernah gagal, tapi tentang bangkit setiap kali jatuh. 💯',
      'Rasa takut adalah tanda bahwa kamu sedang melakukan sesuatu yang berarti. Hadapi dengan berani! 🦁',
      'Tidak ada yang mustahil bagi mereka yang berusaha. Teruslah berjuang! ⚡',
      'Setiap masalah adalah peluang bersembunyi. Cari solusi, bukan alasan! 🔍',
      'Percaya dirimu adalah langkah pertama menuju kesuksesan. Kamu bisa! 💎'
    ],
    coding: [
      'Coding itu seperti memecahkan puzzle — setiap baris kode adalah potongan yang membentuk solusi. Terus latihan ya! 🚀',
      'Error di kode itu normal, bukan kegagalan. Itu tanda kamu sedang belajar! 💻',
      'Belajar coding itu marathon, bukan sprint. Konsistensi lebih penting dari kecepatan. 🏃‍♂️',
      'Setiap programmer hebat pernah menjadi pemula. Jangan bandingkan awalmu dengan puncak orang lain! 👨‍💻',
      'Debug adalah seni. Setiap bug yang kamu perbaiki membuatmu lebih baik dari sebelumnya. 🐛',
      'Jangan hafal sintaks, pahami konsep. Kalau konsep kuat, bahasa apapun bisa dipelajari. 🧠',
      'Google adalah teman terbaik programmer. Tidak ada yang hafal semuanya, yang penting tahu cara mencari! 🔍',
      'Code yang bagus adalah code yang bisa dibaca orang lain. Tulis seolah-olah kamu akan membacanya 1 tahun lagi. 📖',
      'Refactoring bukan membuang waktu, itu investasi untuk masa depan. Code bersih = hidup mudah. ✨',
      'Tidak ada yang namanya code sempurna. Yang ada adalah code yang cukup baik untuk saat ini. Iterasi terus! 🔄'
    ],
    desain: [
      'Desain yang baik bukan hanya tentang estetika, tapi juga tentang bagaimana pengguna merasakan pengalaman. Pikirkan user journey! 🎨',
      'Less is more. Desain sederhana seringkali lebih powerful daripada yang terlalu ramai. ✨',
      'Warna dan tipografi adalah bahasa visual. Pilihlah dengan hati-hati untuk menyampaikan pesan yang tepat. 🖌️',
      'Prototyping cepat, iterasi banyak. Jangan takut untuk mencoba dan mengubah! 🔄',
      'White space bukan ruang kosong, itu ruang bernapas. Biarkan desainmu bernapas! 🌬️',
      'Konsistensi adalah kunci. Gunakan sistem desain untuk menjaga keseragaman. 📐',
      'Desain untuk user, bukan untuk dirimu sendiri. Test dengan orang lain! 👥',
      'Mobile first! Kebanyakan user mengakses dari HP. Pastikan desainmu responsif. 📱',
      'Kontras yang baik = readability yang baik. Pastikan teks bisa dibaca dengan jelas. 👁️',
      'Inspirasi bisa dari mana saja. Lihat Dribbble, Behance, atau bahkan alam sekitarmu! 🌿'
    ],
    cerita: [
      'Dahulu kala, di sebuah kerajaan digital, ada seorang developer yang membangun website paling keren di dunia... 🌟',
      'Ada seekor kucing yang bisa coding. Setiap malam, dia mengetik dengan cakarnya dan membuat aplikasi yang luar biasa! 🐱‍💻',
      'Di planet jauh, ada AI yang belajar tentang cinta dari manusia. Dia menemukan bahwa kebaikan adalah kode terindah... 🤖❤️',
      'Seorang anak kecil menemukan komputer tua di loteng. Saat dinyalakan, dia menemukan dunia digital yang penuh petualangan! 🚀',
      'Di sebuah hutan pixel, ada sprite kecil yang berpetualang mencari bug jahat yang merusak dunianya... 🌲👾',
      'Seorang hacker etis menemukan portal rahasia di internet. Di baliknya, ada internet paralel yang lebih indah... 🌐✨',
      'Robot kecil bernama Byte hidup di server farm. Setiap malam, dia berkeliling membantu data yang tersesat pulang... 🤖🏠',
      'Di dunia di mana semua orang punya superpower, seorang anak biasa menemukan bahwa kecerdasannya adalah kekuatan terbesar... 🧠💪',
      'Seekor burung robot terbang mengelilingi dunia digital, mengumpulkan fragment kode yang hilang untuk menyelamatkan internet... 🐦🌐',
      'Di masa depan, manusia dan AI hidup berdampingan. Tapi satu AI kecil ingin tahu: apa artinya menjadi manusia? 🤔🌍'
    ],
    umum: [
      'Halo! Saya SatzAI, asisten virtualmu. Ada yang bisa saya bantu hari ini? 😊',
      'Wah, pertanyaan menarik! Saya masih belajar banyak hal, tapi saya akan berusaha membantu semampu saya. 📚',
      'Terima kasih sudah bertanya! Saya senang bisa berbincang denganmu. Ada topik lain yang ingin dibahas? 💬',
      'Hmm, saya belum terlalu paham tentang itu. Tapi saya bisa bantu dengan motivasi, coding, desain, atau cerita! 🎯',
      'Setiap hari adalah kesempatan baru untuk belajar. Jangan ragu untuk terus bertanya! 🌟',
      'Saya adalah AI lokal yang berjalan di browsermu. Tidak perlu internet untuk berbincang! 🚀',
      'Waktu di Indonesia sekarang jam ' + new Date().getHours() + ':' + new Date().getMinutes().toString().padStart(2,'0') + '. Semoga harimu menyenangkan! ⏰',
      'Tahukah kamu? Website ini dibuat dengan HTML, CSS, dan JavaScript murni. Tanpa framework! 💻',
      'Saya bisa bantu brainstorming ide, memberi motivasi, atau sekadar berbincang. Apa yang kamu butuhkan? 🤝',
      'Jangan lupa istirahat ya! Terlalu lama di depan layar tidak baik untuk kesehatan. 💪'
    ]
  };

  // Keywords untuk matching
  const keywords = {
    motivasi: ['motivasi', 'semangat', 'bangkit', 'gagal', 'sedih', 'putus', 'capek', 'lelah', 'takut', 'berani', 'kuat', 'bisa', 'semangatin', 'down', 'patah'],
    coding: ['coding', 'program', 'kode', 'code', 'error', 'bug', 'debug', 'javascript', 'html', 'css', 'python', 'developer', 'web', 'app', 'software', 'komputer'],
    desain: ['desain', 'design', 'warna', 'color', 'ui', 'ux', 'tampilan', 'layout', 'font', 'tipografi', 'responsive', 'mobile', 'mockup', 'figma', 'website'],
    cerita: ['cerita', 'dongeng', 'story', 'novel', 'baca', 'petualangan', 'fantasi', 'fiksi', 'naratif', 'karakter', 'plot', 'dongengin', 'kisah']
  };

  function getTime() {
    const now = new Date();
    return now.getHours().toString().padStart(2,'0') + ':' + now.getMinutes().toString().padStart(2,'0');
  }

  function addMessage(text, isUser) {
    if (welcome) welcome.style.display = 'none';
    const msg = document.createElement('div');
    msg.className = 'message ' + (isUser ? 'user' : 'ai');
    msg.innerHTML = `
      <div class="avatar">${isUser ? '👤' : '🤖'}</div>
      <div class="bubble">
        ${text}
        <span class="time">${getTime()}</span>
      </div>
    `;
    chatArea.appendChild(msg);
    chatArea.scrollTop = chatArea.scrollHeight;
  }

  function addTyping() {
    const typing = document.createElement('div');
    typing.className = 'message ai';
    typing.id = 'typing-indicator';
    typing.innerHTML = `
      <div class="avatar">🤖</div>
      <div class="bubble">
        <div class="typing"><span></span><span></span><span></span></div>
      </div>
    `;
    chatArea.appendChild(typing);
    chatArea.scrollTop = chatArea.scrollHeight;
    return typing;
  }

  function removeTyping() {
    const typing = document.getElementById('typing-indicator');
    if (typing) typing.remove();
  }

  function getResponse(text) {
    const lower = text.toLowerCase();

    // Cek keywords
    for (const [category, words] of Object.entries(keywords)) {
      if (words.some(w => lower.includes(w))) {
        const list = responses[category];
        return list[Math.floor(Math.random() * list.length)];
      }
    }

    // Default: umum
    const list = responses.umum;
    return list[Math.floor(Math.random() * list.length)];
  }

  function sendMessage() {
    const text = userInput.value.trim();
    if (!text) return;

    userInput.value = '';
    addMessage(text, true);

    sendBtn.disabled = true;
    const typing = addTyping();

    // Simulasi delay thinking (1-2 detik)
    setTimeout(() => {
      removeTyping();
      const response = getResponse(text);
      addMessage(response, false);
      sendBtn.disabled = false;
      userInput.focus();
    }, 1000 + Math.random() * 1000);
  }

  function sendSuggestion(el) {
    userInput.value = el.textContent.replace(/^[📝💻🎨📚] /, '');
    sendMessage();
  }

  userInput.focus();
</script>

</body>
</html>
