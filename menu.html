<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Satria Store — Menu</title>
<style>
  :root {
    --bg: #0a0b10;
    --accent: #8b9cff;
    --accent-soft: rgba(139, 156, 255, 0.5);
    --text: #f2f3f8;
    --muted: rgba(242, 243, 248, 0.45);
    --card: #14161f;
    --card-hi: #1b1e2b;
    --line: rgba(255,255,255,0.06);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    height: 100%;
    background: var(--bg);
    overflow: hidden;
  }
  body {
    font-family: 'Segoe UI', system-ui, sans-serif;
    color: var(--text);
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
  }

  #bg-video {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    object-fit: cover;
    z-index: 0;
    filter: brightness(0.22) saturate(0.9) blur(1px);
  }

  body::after {
    content: '';
    position: fixed;
    inset: 0;
    z-index: 1;
    pointer-events: none;
    background: radial-gradient(ellipse at center, transparent 30%, rgba(10,11,16,0.75) 100%);
  }

  .panel {
    position: relative;
    z-index: 2;
    text-align: center;
    padding: 44px 38px 36px;
    background: rgba(18, 19, 27, 0.62);
    border: 1px solid var(--line);
    border-radius: 26px;
    backdrop-filter: blur(22px);
    box-shadow:
      0 40px 90px rgba(0,0,0,0.5),
      inset 0 1px 0 rgba(255,255,255,0.04);
    width: 90%;
    max-width: 380px;
    animation: fadeUp .7s cubic-bezier(.16,1,.3,1) both;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(18px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .eyebrow {
    font-size: 11px;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: var(--muted);
    font-weight: 600;
    margin-bottom: 12px;
  }

  h1 {
    font-size: 25px;
    font-weight: 800;
    letter-spacing: .3px;
    color: var(--text);
    margin-bottom: 30px;
  }

  h1 span {
    color: var(--accent);
  }

  .menu {
    display: flex;
    flex-direction: column;
    gap: 14px;
    perspective: 800px;
  }

  a.btn {
    position: relative;
    display: flex;
    align-items: center;
    gap: 16px;
    padding: 16px 20px;
    background: linear-gradient(155deg, var(--card-hi), var(--card));
    border: 1px solid var(--line);
    border-radius: 16px;
    color: var(--text);
    text-decoration: none;
    text-align: left;
    transform-style: preserve-3d;
    box-shadow:
      0 1px 0 rgba(255,255,255,0.05) inset,
      0 10px 20px rgba(0,0,0,0.35),
      0 2px 4px rgba(0,0,0,0.3);
    transition: transform .18s ease-out, box-shadow .18s ease-out, border-color .18s ease-out;
    will-change: transform;
  }

  a.btn:hover {
    border-color: var(--accent-soft);
    box-shadow:
      0 1px 0 rgba(255,255,255,0.08) inset,
      0 22px 40px rgba(0,0,0,0.45),
      0 0 0 1px rgba(139,156,255,0.12),
      0 0 24px rgba(139,156,255,0.15);
  }

  .icon-badge {
    width: 42px;
    height: 42px;
    flex-shrink: 0;
    border-radius: 13px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 19px;
    background: linear-gradient(155deg, #23273a, #191c28);
    border: 1px solid var(--line);
    box-shadow:
      0 1px 0 rgba(255,255,255,0.06) inset,
      0 4px 10px rgba(0,0,0,0.4);
  }

  a.btn:hover .icon-badge {
    box-shadow:
      0 1px 0 rgba(255,255,255,0.1) inset,
      0 6px 14px rgba(0,0,0,0.45),
      0 0 16px rgba(139,156,255,0.25);
  }

  .label {
    flex: 1;
    min-width: 0;
  }

  .label .name {
    display: block;
    font-size: 14px;
    font-weight: 700;
    margin-bottom: 2px;
  }

  .label small {
    display: block;
    font-size: 11px;
    color: var(--muted);
    font-weight: 500;
  }

  .arrow {
    font-size: 14px;
    color: var(--muted);
    flex-shrink: 0;
    transform: translateZ(10px);
    transition: transform .18s ease, color .18s ease;
  }

  a.btn:hover .arrow {
    transform: translateZ(10px) translateX(3px);
    color: var(--accent);
  }

  footer {
    position: fixed;
    z-index: 2;
    bottom: 20px;
    left: 0;
    right: 0;
    text-align: center;
    font-size: 10px;
    color: var(--muted);
    letter-spacing: 2px;
  }

  @media (max-width: 420px) {
    .panel { padding: 36px 24px 28px; }
  }
</style>
</head>
<body>

<video id="bg-video" src="back.mp4" autoplay muted loop playsinline></video>
<audio id="bgm" src="satria.mp3" loop></audio>

<div class="panel">
  <div class="eyebrow">Satria Network</div>
  <h1><span>𝐒𝐀𝐓𝐗𝐗</span>𝐂𝐋𝐎𝐔𝐃𝐒</h1>

  <div class="menu">
    <a class="btn" href="index.html">
      <span class="icon-badge">🛒</span>
      <span class="label"><span class="name">Store</span><small>Belanja layanan digital</small></span>
      <span class="arrow">→</span>
    </a>
    <a class="btn" href="ai.html">
      <span class="icon-badge">🤖</span>
      <span class="label"><span class="name">SatzAI</span><small>Chat dengan asisten AI</small></span>
      <span class="arrow">→</span>
    </a>
    <a class="btn" href="pc.html">
      <span class="icon-badge">🖥️</span>
      <span class="label"><span class="name">PC Gaming</span><small>Premium builds</small></span>
      <span class="arrow">→</span>
    </a>
    <a class="btn" href="qr.html">
      <span class="icon-badge">📱</span>
      <span class="label"><span class="name">QR Studio</span><small>Generate & scan</small></span>
      <span class="arrow">→</span>
    </a>
    <a class="btn" href="music.html">
      <span class="icon-badge">🎵</span>
      <span class="label"><span class="name">Now Playing</span><small>Audio visualizer</small></span>
      <span class="arrow">→</span>
    </a>
    <a class="btn" href="komponen.html">
      <span class="icon-badge">📓</span>
      <span class="label"><span class="name">Komponen</span><small>Daftar komponen</small></span>
      <span class="arrow">→</span>
    </a>
    <a class="btn" href="kuliner.html">
      <span class="icon-badge">🍽️</span>
      <span class="label"><span class="name">Kuliner</span><small>Temukan restoran terbaik</small></span>
      <span class="arrow">→</span>
    </a>
  </div>
</div>

<footer>SATRIA SYSTEM · ONLINE</footer>

<script>
  // ── AUDIO ────────────────────────────────────────────────────
  var bgm = document.getElementById('bgm');
  bgm.volume = 0.5;

  bgm.play().catch(function () {
    function unlockAudio() {
      bgm.play();
      document.removeEventListener('click', unlockAudio);
      document.removeEventListener('touchstart', unlockAudio);
    }
    document.addEventListener('click', unlockAudio);
    document.addEventListener('touchstart', unlockAudio);
  });

  var navButtons = document.querySelectorAll('.btn');
  navButtons.forEach(function (btn) {
    btn.addEventListener('click', function () {
      bgm.pause();
    });
  });

  // ── 3D TILT EFFECT ───────────────────────────────────────────
  navButtons.forEach(function (btn) {
    btn.addEventListener('mousemove', function (e) {
      var rect = btn.getBoundingClientRect();
      var x = e.clientX - rect.left;
      var y = e.clientY - rect.top;
      var cx = rect.width / 2;
      var cy = rect.height / 2;
      var rotateX = ((y - cy) / cy) * -6;
      var rotateY = ((x - cx) / cx) * 6;
      btn.style.transform = 'perspective(800px) rotateX(' + rotateX + 'deg) rotateY(' + rotateY + 'deg) translateY(-3px) scale(1.015)';
    });
    btn.addEventListener('mouseleave', function () {
      btn.style.transform = 'perspective(800px) rotateX(0) rotateY(0) translateY(0) scale(1)';
    });
  });
</script>

</body>
</html>
