<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Satria Store — Menu</title>
<style>
  :root {
    --bg: #07050f;
    --accent: #a855f7;
    --neon: #e879f9;
    --cyan: #06b6d4;
    --text: #f0eaff;
    --muted: rgba(240, 234, 255, 0.5);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    height: 100%;
    background: var(--bg);
    overflow: hidden;
  }
  body {
    font-family: 'Segoe UI', system-ui, sans-serif;
    color: var(--text);
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
  }

  #bg-video {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    object-fit: cover;
    z-index: 0;
    filter: brightness(0.55) saturate(1.1);
  }

  body::before {
    content: '';
    position: fixed;
    top: -30%;
    left: 50%;
    transform: translateX(-50%);
    width: 900px;
    height: 700px;
    background: radial-gradient(ellipse, rgba(168,85,247,0.18) 0%, transparent 70%);
    pointer-events: none;
    z-index: 1;
  }

  .panel {
    position: relative;
    z-index: 2;
    text-align: center;
    padding: 48px 40px;
    background: rgba(14, 10, 26, 0.55);
    border: 1px solid rgba(168, 85, 247, 0.25);
    border-radius: 22px;
    backdrop-filter: blur(14px);
    box-shadow: 0 0 60px rgba(168, 85, 247, 0.15);
    width: 90%;
    max-width: 420px;
    animation: fadeUp .8s ease both;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(24px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .eyebrow {
    font-size: 12px;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: var(--cyan);
    margin-bottom: 10px;
    opacity: .8;
  }

  h1 {
    font-size: 30px;
    font-weight: 900;
    margin-bottom: 6px;
    background: linear-gradient(135deg, var(--accent), var(--neon));
    -webkit-background-clip: text;
    background-clip: text;
    -webkit-text-fill-color: transparent;
  }

  .sub {
    font-size: 13px;
    color: var(--muted);
    margin-bottom: 32px;
  }

  .menu {
    display: flex;
    flex-direction: column;
    gap: 14px;
  }

  a.btn {
    position: relative;
    display: flex;
    align-items: center;
    gap: 14px;
    padding: 16px 20px;
    border-radius: 14px;
    background: rgba(255,255,255,0.03);
    border: 1px solid rgba(168, 85, 247, 0.25);
    color: var(--text);
    text-decoration: none;
    font-size: 15px;
    font-weight: 600;
    text-align: left;
    overflow: hidden;
    transition: border-color .25s, transform .25s, background .25s;
  }

  a.btn::before {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(120deg, transparent, rgba(232,121,249,0.15), transparent);
    transform: translateX(-120%);
    transition: transform .5s;
  }

  a.btn:hover {
    transform: translateY(-3px);
    border-color: var(--neon);
    background: rgba(168, 85, 247, 0.12);
  }

  a.btn:hover::before {
    transform: translateX(120%);
  }

  .icon {
    font-size: 22px;
    flex-shrink: 0;
    filter: drop-shadow(0 0 6px rgba(232,121,249,0.6));
  }

  .label small {
    display: block;
    font-size: 11px;
    color: var(--muted);
    font-weight: 400;
    margin-top: 2px;
  }

  footer {
    position: relative;
    z-index: 2;
    position: fixed;
    bottom: 16px;
    font-size: 11px;
    color: var(--muted);
    letter-spacing: 1px;
  }
</style>
<base target="_blank">
<base target="_blank">
</head>
<body>

<video id="bg-video" src="back.mp4" autoplay muted loop playsinline></video>
<audio id="bgm" src="satria.mp3" loop></audio>

<div class="panel">
  <div class="eyebrow">Satria Network</div>
  <h1>𝐒𝐀𝐓𝐗𝐗𝐂𝐋𝐎𝐔𝐃𝐒</h1>
  <div class="sub"></div>

  <div class="menu">
    <a class="btn" href="index.html">
      <span class="icon">🛒</span>
      <span class="label">KERANJANG KUNING<small>GAUSA MASUK GAADA APA APA</small></span>
    </a>
    <a class="btn" href="ai.html">
      <span class="icon">🤖</span>
      <span class="label">TANYA TANYA SINI<small>BOT AI V2</small></span>
    </a>
    <a class="btn" href="pc.html">
      <span class="icon">🖥️</span>
      <span class="label">TOKO PC GAMING<small>PREMIUM BUILDS</small></span>
    </a>
    <a class="btn" href="qr.html">
      <span class="icon">📱</span>
      <span class="label">QR CODE STUDIO<small>GENERATE & SCAN</small></span>
    </a>
    <a class="btn" href="music.html">
      <span class="icon">🎵</span>
      <span class="label">PLAYING MUSIC<small>AUDIO VISUALIZER</small></span>
    </a>
  </div>
</div>

<footer>SATRIA SYSTEM // ONLINE</footer>

<script>
  var bgm = document.getElementById('bgm');
  bgm.volume = 0.5;

  bgm.play().catch(function () {
    function unlockAudio() {
      bgm.play();
      document.removeEventListener('click', unlockAudio);
      document.removeEventListener('touchstart', unlockAudio);
    }
    document.addEventListener('click', unlockAudio);
    document.addEventListener('touchstart', unlockAudio);
  });

  var navButtons = document.querySelectorAll('.btn');
  navButtons.forEach(function (btn) {
    btn.addEventListener('click', function () {
      bgm.pause();
    });
  });
</script>

</body>
</html>
