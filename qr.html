<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Satria QR — Generator & Scanner</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html5-qrcode/2.3.8/html5-qrcode.min.js"></script>
<style>
  :root {
    --bg: #07050f;
    --panel: rgba(14, 10, 26, 0.7);
    --accent: #a855f7;
    --neon: #e879f9;
    --cyan: #06b6d4;
    --lime: #84cc16;
    --rose: #f43f5e;
    --text: #f0eaff;
    --muted: rgba(240, 234, 255, 0.5);
    --border: rgba(168, 85, 247, 0.25);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    min-height: 100vh;
    background: var(--bg);
    font-family: 'Segoe UI', system-ui, sans-serif;
    color: var(--text);
    overflow-x: hidden;
  }

  body::before {
    content: '';
    position: fixed;
    top: -20%; left: 50%;
    transform: translateX(-50%);
    width: 800px; height: 600px;
    background: radial-gradient(ellipse, rgba(168,85,247,0.15) 0%, transparent 70%);
    pointer-events: none;
    z-index: 0;
  }

  .container {
    position: relative;
    z-index: 1;
    max-width: 900px;
    margin: 0 auto;
    padding: 40px 20px;
  }

  .header {
    text-align: center;
    margin-bottom: 40px;
    animation: fadeUp 0.8s ease both;
  }
  .header .eyebrow {
    font-size: 12px;
    letter-spacing: 4px;
    text-transform: uppercase;
    color: var(--cyan);
    margin-bottom: 10px;
  }
  .header h1 {
    font-size: 36px;
    font-weight: 900;
    background: linear-gradient(135deg, var(--accent), var(--neon));
    -webkit-background-clip: text;
    background-clip: text;
    -webkit-text-fill-color: transparent;
    margin-bottom: 8px;
  }
  .header p {
    color: var(--muted);
    font-size: 14px;
  }

  .tabs {
    display: flex;
    gap: 10px;
    justify-content: center;
    margin-bottom: 30px;
    animation: fadeUp 0.8s 0.1s ease both;
  }
  .tab-btn {
    padding: 12px 28px;
    border-radius: 12px;
    border: 1px solid var(--border);
    background: rgba(255,255,255,0.03);
    color: var(--muted);
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.3s;
    font-family: inherit;
  }
  .tab-btn:hover {
    border-color: var(--neon);
    color: var(--text);
  }
  .tab-btn.active {
    background: linear-gradient(135deg, var(--accent), var(--neon));
    border-color: transparent;
    color: #fff;
    box-shadow: 0 0 30px rgba(168,85,247,0.3);
  }

  .panel {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 22px;
    padding: 32px;
    backdrop-filter: blur(14px);
    box-shadow: 0 0 60px rgba(168, 85, 247, 0.1);
    animation: fadeUp 0.8s 0.2s ease both;
  }

  .input-group {
    margin-bottom: 24px;
  }
  .input-group label {
    display: block;
    font-size: 13px;
    font-weight: 600;
    color: var(--muted);
    margin-bottom: 8px;
    text-transform: uppercase;
    letter-spacing: 1px;
  }
  .input-group input, .input-group textarea, .input-group select {
    width: 100%;
    padding: 14px 18px;
    border-radius: 14px;
    border: 1px solid var(--border);
    background: rgba(255,255,255,0.03);
    color: var(--text);
    font-size: 15px;
    font-family: inherit;
    outline: none;
    transition: all 0.3s;
  }
  .input-group input:focus, .input-group textarea:focus, .input-group select:focus {
    border-color: var(--neon);
    box-shadow: 0 0 20px rgba(232,121,249,0.1);
  }
  .input-group textarea {
    min-height: 100px;
    resize: vertical;
  }

  .color-row {
    display: flex;
    gap: 12px;
    flex-wrap: wrap;
    margin-bottom: 24px;
  }
  .color-option {
    width: 44px; height: 44px;
    border-radius: 12px;
    border: 2px solid transparent;
    cursor: pointer;
    transition: all 0.3s;
    position: relative;
  }
  .color-option:hover { transform: scale(1.1); }
  .color-option.active {
    border-color: #fff;
    box-shadow: 0 0 20px currentColor;
  }
  .color-option.active::after {
    content: '✓';
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    font-size: 18px;
    color: #fff;
    text-shadow: 0 2px 4px rgba(0,0,0,0.5);
  }
  .color-purple { background: var(--accent); }
  .color-pink { background: var(--neon); }
  .color-cyan { background: var(--cyan); }
  .color-lime { background: var(--lime); }
  .color-rose { background: var(--rose); }
  .color-white { background: #fff; }
  .color-black { background: #000; border: 1px solid rgba(255,255,255,0.2); }

  .slider-row {
    display: flex;
    align-items: center;
    gap: 16px;
    margin-bottom: 24px;
  }
  .slider-row label {
    font-size: 13px;
    font-weight: 600;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 1px;
    white-space: nowrap;
  }
  .slider-row input[type="range"] {
    flex: 1;
    -webkit-appearance: none;
    appearance: none;
    height: 6px;
    border-radius: 3px;
    background: rgba(255,255,255,0.1);
    outline: none;
  }
  .slider-row input[type="range"]::-webkit-slider-thumb {
    -webkit-appearance: none;
    appearance: none;
    width: 20px; height: 20px;
    border-radius: 50%;
    background: linear-gradient(135deg, var(--accent), var(--neon));
    cursor: pointer;
    box-shadow: 0 0 10px rgba(168,85,247,0.5);
  }
  .slider-value {
    font-size: 14px;
    font-weight: 700;
    color: var(--neon);
    min-width: 40px;
    text-align: right;
  }

  .qr-result {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 20px;
    margin-top: 20px;
  }
  #qrcode {
    padding: 20px;
    background: #fff;
    border-radius: 16px;
    box-shadow: 0 8px 32px rgba(0,0,0,0.3);
    transition: transform 0.3s;
  }
  #qrcode:hover { transform: scale(1.02); }
  #qrcode img {
    display: block;
    border-radius: 8px;
  }

  .btn-row {
    display: flex;
    gap: 12px;
    flex-wrap: wrap;
    justify-content: center;
  }
  .btn {
    padding: 14px 28px;
    border-radius: 14px;
    border: none;
    font-size: 14px;
    font-weight: 700;
    cursor: pointer;
    font-family: inherit;
    transition: all 0.3s;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .btn-primary {
    background: linear-gradient(135deg, var(--accent), var(--neon));
    color: #fff;
    box-shadow: 0 4px 20px rgba(168,85,247,0.3);
  }
  .btn-primary:hover {
    transform: translateY(-2px);
    box-shadow: 0 8px 30px rgba(168,85,247,0.4);
  }
  .btn-secondary {
    background: rgba(255,255,255,0.05);
    border: 1px solid var(--border);
    color: var(--text);
  }
  .btn-secondary:hover {
    border-color: var(--neon);
    background: rgba(168,85,247,0.1);
  }

  .scan-result {
    margin-top: 24px;
    padding: 20px;
    border-radius: 14px;
    background: rgba(6,182,212,0.08);
    border: 1px solid rgba(6,182,212,0.2);
    display: none;
  }
  .scan-result.show { display: block; animation: fadeUp 0.4s ease; }
  .scan-result h3 {
    font-size: 13px;
    color: var(--cyan);
    text-transform: uppercase;
    letter-spacing: 1px;
    margin-bottom: 8px;
  }
  .scan-result p {
    font-size: 15px;
    color: var(--text);
    word-break: break-all;
  }
  .scan-result a {
    color: var(--neon);
    text-decoration: none;
  }
  .scan-result a:hover { text-decoration: underline; }

  #reader {
    border-radius: 16px;
    overflow: hidden;
    margin: 0 auto;
    max-width: 400px;
  }
  #reader video {
    border-radius: 16px;
  }

  .hidden { display: none !important; }

  footer {
    text-align: center;
    margin-top: 40px;
    font-size: 11px;
    color: var(--muted);
    letter-spacing: 1px;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(24px); }
    to { opacity: 1; transform: translateY(0); }
  }

  @media (max-width: 600px) {
    .header h1 { font-size: 28px; }
    .panel { padding: 24px; }
    .tabs { flex-wrap: wrap; }
    .tab-btn { padding: 10px 20px; font-size: 13px; }
  }
</style>
<base target="_blank">
</head>
<body>

<div class="container">
  <div class="header">
    <div class="eyebrow">Satria Network</div>
    <h1>🪐 QR CODE STUDIO</h1>
    <p>Generate & Scan QR Code dengan style</p>
  </div>

  <div class="tabs">
    <button class="tab-btn active" onclick="switchTab('generate')">⚡ Generate</button>
    <button class="tab-btn" onclick="switchTab('scan')">📷 Scan</button>
  </div>

  <div id="tab-generate" class="panel">
    <div class="input-group">
      <label>Isi QR Code</label>
      <textarea id="qr-text" placeholder="Ketik link, teks, nomor WhatsApp, atau apapun...">https://satria.store</textarea>
    </div>

    <div class="input-group">
      <label>Pilih Warna QR</label>
      <div class="color-row">
        <div class="color-option color-purple active" data-color="#a855f7" onclick="setColor(this, '#a855f7')"></div>
        <div class="color-option color-pink" data-color="#e879f9" onclick="setColor(this, '#e879f9')"></div>
        <div class="color-option color-cyan" data-color="#06b6d4" onclick="setColor(this, '#06b6d4')"></div>
        <div class="color-option color-lime" data-color="#84cc16" onclick="setColor(this, '#84cc16')"></div>
        <div class="color-option color-rose" data-color="#f43f5e" onclick="setColor(this, '#f43f5e')"></div>
        <div class="color-option color-white" data-color="#ffffff" onclick="setColor(this, '#ffffff')"></div>
        <div class="color-option color-black" data-color="#000000" onclick="setColor(this, '#000000')"></div>
      </div>
    </div>

    <div class="slider-row">
      <label>Ukuran</label>
      <input type="range" id="qr-size" min="100" max="400" value="256" oninput="updateSize(this.value)">
      <span class="slider-value" id="size-value">256px</span>
    </div>

    <div class="btn-row">
      <button class="btn btn-primary" onclick="generateQR()">
        <span>⚡</span> Generate QR
      </button>
      <button class="btn btn-secondary" onclick="downloadQR()">
        <span>💾</span> Download PNG
      </button>
      <button class="btn btn-secondary" onclick="copyQR()">
        <span>📋</span> Copy Link
      </button>
    </div>

    <div class="qr-result" id="qr-result">
      <div id="qrcode"></div>
    </div>
  </div>

  <div id="tab-scan" class="panel hidden">
    <div id="reader"></div>
    <div class="scan-result" id="scan-result">
      <h3>📱 Hasil Scan</h3>
      <p id="scan-text"></p>
    </div>
    <div class="btn-row" style="margin-top:20px">
      <button class="btn btn-primary" onclick="startScan()">
        <span>📷</span> Mulai Scan
      </button>
      <button class="btn btn-secondary" onclick="stopScan()">
        <span>⏹️</span> Stop Scan
      </button>
    </div>
  </div>

  <footer>SATRIA SYSTEM // QR STUDIO</footer>
</div>

<script>
  let currentColor = '#a855f7';
  let currentSize = 256;
  let qrCodeObj = null;
  let html5QrCode = null;

  function switchTab(tab) {
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    event.target.classList.add('active');
    document.getElementById('tab-generate').classList.toggle('hidden', tab !== 'generate');
    document.getElementById('tab-scan').classList.toggle('hidden', tab !== 'scan');
    if (tab === 'generate') stopScan();
  }

  function setColor(el, color) {
    document.querySelectorAll('.color-option').forEach(c => c.classList.remove('active'));
    el.classList.add('active');
    currentColor = color;
    generateQR();
  }

  function updateSize(val) {
    currentSize = parseInt(val);
    document.getElementById('size-value').textContent = val + 'px';
  }

  function generateQR() {
    const text = document.getElementById('qr-text').value.trim();
    if (!text) return;
    const container = document.getElementById('qrcode');
    container.innerHTML = '';
    qrCodeObj = new QRCode(container, {
      text: text,
      width: currentSize,
      height: currentSize,
      colorDark: currentColor,
      colorLight: '#ffffff',
      correctLevel: QRCode.CorrectLevel.H
    });
  }

  function downloadQR() {
    const img = document.querySelector('#qrcode img');
    if (!img) { alert('Generate QR dulu ya!'); return; }
    const link = document.createElement('a');
    link.download = 'satria-qr-' + Date.now() + '.png';
    link.href = img.src;
    link.click();
  }

  function copyQR() {
    const text = document.getElementById('qr-text').value;
    navigator.clipboard.writeText(text).then(() => {
      const btn = event.target.closest('.btn');
      const original = btn.innerHTML;
      btn.innerHTML = '<span>✅</span> Tersalin!';
      setTimeout(() => btn.innerHTML = original, 1500);
    });
  }

  function startScan() {
    const result = document.getElementById('scan-result');
    result.classList.remove('show');
    html5QrCode = new Html5Qrcode("reader");
    html5QrCode.start(
      { facingMode: "environment" },
      { fps: 10, qrbox: { width: 250, height: 250 } },
      (decodedText) => {
        document.getElementById('scan-text').innerHTML =
          decodedText.startsWith('http')
            ? '<a href="' + decodedText + '" target="_blank">' + decodedText + '</a>'
            : decodedText;
        result.classList.add('show');
        stopScan();
      },
      (error) => {}
    ).catch(err => {
      alert('Kamera tidak tersedia. Pastikan izin kamera sudah diberikan.');
    });
  }

  function stopScan() {
    if (html5QrCode) {
      html5QrCode.stop().then(() => {
        html5QrCode.clear();
        html5QrCode = null;
      }).catch(() => {});
    }
  }

  window.onload = () => generateQR();
</script>

</body>
</html>
